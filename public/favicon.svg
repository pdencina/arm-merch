<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#18181b"/>
  <g transform="translate(16, 16) scale(0.18)">
    <!-- Elipse orbital -->
    <ellipse cx="5" cy="8" rx="58" ry="22" fill="none" stroke="#ffffff" stroke-width="3" transform="rotate(-8)"/>
    <!-- Letra M grande -->
    <text x="-32" y="22" font-family="Georgia, serif" font-size="58" font-weight="bold" fill="#ffffff">M</text>
    <!-- "ar" encima -->
    <text x="-8" y="-8" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#ffffff">ar</text>
    <!-- "erch" -->
    <text x="18" y="22" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#ffffff">erch</text>
    <!-- Estrella de 4 puntas -->
    <g transform="translate(52, -14)">
      <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#ffffff"/>
    </g>
    <g transform="translate(44, -6)">
      <path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1 Z" fill="#ffffff"/>
    </g>
  </g>
</svg>
